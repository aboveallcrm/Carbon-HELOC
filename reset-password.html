<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f2b4c">
    <title>Reset Password | Above All Carbon HELOC</title>
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f2b4c;
            --accent-color: #c5a059;
            --accent-light: #d4b76a;
            --bg-dark: #0a0f1a;
            --bg-card: #111827;
            --bg-input: #0d1322;
            --border-subtle: rgba(197, 160, 89, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --font-heading: 'DM Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark); font-family: var(--font-body);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            color: var(--text-primary); position: relative;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image: linear-gradient(rgba(197,160,89,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(197,160,89,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.12; z-index: 0; animation: float 20s ease-in-out infinite; }
        .bg-glow.gold { background: var(--accent-color); top: -200px; right: -100px; }
        .bg-glow.blue { background: #1e40af; bottom: -200px; left: -100px; animation-delay: -10s; }
        @keyframes float { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-20px,30px) scale(0.95)} }
        .container { position: relative; z-index: 1; width: 100%; max-width: 460px; padding: 20px; }
        .brand { text-align: center; margin-bottom: 32px; }
        .brand h1 { font-family: var(--font-heading); font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; line-height: 1.2; }
        .brand h1 span { display: block; background: linear-gradient(135deg, var(--accent-color), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .brand p { color: var(--text-muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }
        .card {
            background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px;
            padding: 40px 36px; box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
            backdrop-filter: blur(20px);
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-group input {
            width: 100%; padding: 13px 16px; background: var(--bg-input); border: 1px solid var(--border-subtle);
            border-radius: 10px; color: var(--text-primary); font-family: var(--font-body); font-size: 15px; transition: all 0.2s;
        }
        .form-group input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(197,160,89,0.1); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px; font-family: var(--font-heading);
            font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-light)); color: var(--primary-color);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(197,160,89,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-msg { display: none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .success-msg { display: none; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 13px; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: var(--accent-color); }
        .strength { height: 4px; border-radius: 2px; margin-top: 6px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .strength-bar { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0; }
        .strength-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow gold"></div>
    <div class="bg-glow blue"></div>

    <div class="container">
        <div class="brand">
            <h1>Above All <span>Carbon HELOC</span></h1>
            <p>Reset Your Password</p>
        </div>
        <div class="card">
            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <div id="reset-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password" autocomplete="new-password">
                    <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
                    <div class="strength-label" id="strength-label"></div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password">
                </div>
                <button class="btn" id="reset-btn">Update Password</button>
            </div>

            <a href="login.html" class="back-link">Back to Login</a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://czzabvfzuxhpdcowgvam.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6emFidmZ6dXhocGRjb3dndmFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjgwNTYsImV4cCI6MjA4NDc0NDA1Nn0.tFliE-x2Tz9ET3A38R4y7eSo6bUu-bYY47XkWeX1xHY';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const errEl = document.getElementById('error-msg');
        const successEl = document.getElementById('success-msg');
        const resetForm = document.getElementById('reset-form');
        const newPw = document.getElementById('new-password');
        const confirmPw = document.getElementById('confirm-password');
        const resetBtn = document.getElementById('reset-btn');
        const strengthBar = document.getElementById('strength-bar');
        const strengthLabel = document.getElementById('strength-label');

        // Password strength indicator
        newPw.addEventListener('input', () => {
            const pw = newPw.value;
            let score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            const pct = Math.min(score / 5 * 100, 100);
            const color = pct <= 40 ? '#ef4444' : pct <= 60 ? '#f59e0b' : '#10b981';
            const label = pct <= 40 ? 'Weak' : pct <= 60 ? 'Fair' : pct <= 80 ? 'Good' : 'Strong';
            strengthBar.style.width = pct + '%';
            strengthBar.style.background = color;
            strengthLabel.textContent = pw.length > 0 ? label : '';
            strengthLabel.style.color = color;
        });

        // Supabase handles the recovery token exchange automatically via the URL hash
        // When the user clicks the email link, Supabase redirects here with #access_token=...&type=recovery
        // The JS client picks up the token and establishes a session
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (!session) {
            // No valid session — the recovery link may have expired or been used already
            errEl.innerText = 'Invalid or expired reset link. Please request a new password reset from the login page.';
            errEl.style.display = 'block';
            resetForm.style.display = 'none';
        }

        resetBtn.addEventListener('click', async () => {
            errEl.style.display = 'none';
            successEl.style.display = 'none';

            const pw = newPw.value;
            const cpw = confirmPw.value;

            if (!pw || pw.length < 8) {
                errEl.innerText = 'Password must be at least 8 characters.';
                errEl.style.display = 'block';
                return;
            }
            if (pw !== cpw) {
                errEl.innerText = 'Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Updating...';

            const { error } = await supabase.auth.updateUser({ password: pw });

            if (error) {
                errEl.innerText = error.message;
                errEl.style.display = 'block';
                resetBtn.disabled = false;
                resetBtn.textContent = 'Update Password';
            } else {
                // Sign out so they log in fresh with the new password
                await supabase.auth.signOut();
                resetForm.style.display = 'none';
                successEl.innerHTML = 'Password updated successfully!<br><small style="opacity:0.7">Redirecting to login...</small>';
                successEl.style.display = 'block';
                setTimeout(() => { window.location.href = 'login.html'; }, 2500);
            }
        });

        // Allow Enter key to submit
        confirmPw.addEventListener('keydown', (e) => { if (e.key === 'Enter') resetBtn.click(); });
        newPw.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmPw.focus(); });
    </script>
</body>
</html>
