<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Above All Carbon HELOC</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f2b4c;
            --accent-color: #c5a059;
            --accent-dark: #a68543;
            --accent-light: #d4b76a;
            --bg-dark: #0a0f1a;
            --bg-card: #111827;
            --bg-input: #0d1322;
            --border-subtle: rgba(197, 160, 89, 0.15);
            --border-hover: rgba(197, 160, 89, 0.35);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --font-heading: 'DM Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* ── Animated Background ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(197, 160, 89, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(197, 160, 89, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        .bg-glow.gold {
            background: var(--accent-color);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-glow.blue {
            background: #1e40af;
            bottom: -200px;
            left: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.05); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(20px, 20px) scale(1.03); }
        }

        /* ── Login Container ── */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        /* ── Brand Header ── */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            position: relative;
        }

        .brand-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.3));
        }

        .brand h1 {
            font-family: var(--font-heading);
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .brand h1 span {
            display: block;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* ── Card ── */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            backdrop-filter: blur(20px);
        }

        /* ── Google Button ── */
        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 13px 20px;
            background: #ffffff;
            color: #1f2937;
            border: none;
            border-radius: 10px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0;
            text-transform: none;
        }

        .google-btn:hover {
            background: #f8fafc;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transform: translateY(-1px);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }

        .divider span {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.1);
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .remember-me span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .forgot-link {
            font-size: 13px;
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--accent-light);
            text-decoration: underline;
        }

        /* ── Submit Button ── */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .submit-btn:hover::before {
            opacity: 1;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(197, 160, 89, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Messages ── */
        .msg {
            font-size: 13px;
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        .msg.error {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .msg.success {
            color: #86efac;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /* ── Footer Links ── */
        .card-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .card-footer p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .card-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .card-footer a:hover {
            color: var(--accent-light);
            text-decoration: underline;
        }


        /* ── Responsive ── */
        @media (max-width: 520px) {
            .login-container {
                padding: 16px;
            }

            .login-card {
                padding: 28px 24px;
            }

            .brand h1 {
                font-size: 22px;
            }

            .form-row {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }

        /* ── Entrance Animation ── */
        .login-container {
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="bg-glow gold"></div>
    <div class="bg-glow blue"></div>

    <div class="login-container">
        <!-- Brand Header -->
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="gold-grad" x1="0" y1="0" x2="64" y2="64">
                            <stop offset="0%" stop-color="#d4b76a"/>
                            <stop offset="50%" stop-color="#c5a059"/>
                            <stop offset="100%" stop-color="#a68543"/>
                        </linearGradient>
                    </defs>
                    <!-- Diamond / Carbon shape -->
                    <path d="M32 4L58 24L32 60L6 24L32 4Z" stroke="url(#gold-grad)" stroke-width="2" fill="none"/>
                    <path d="M32 4L58 24L32 60L6 24L32 4Z" fill="url(#gold-grad)" opacity="0.08"/>
                    <path d="M6 24H58" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.5"/>
                    <path d="M32 4L22 24L32 60" stroke="url(#gold-grad)" stroke-width="1" opacity="0.3"/>
                    <path d="M32 4L42 24L32 60" stroke="url(#gold-grad)" stroke-width="1" opacity="0.3"/>
                    <!-- Inner C -->
                    <text x="32" y="34" text-anchor="middle" dominant-baseline="central"
                          font-family="DM Sans, sans-serif" font-weight="800" font-size="18"
                          fill="url(#gold-grad)">C</text>
                </svg>
            </div>
            <h1>Above All <span>Carbon HELOC</span></h1>
            <p>Loan Officer Portal</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Google OAuth -->
            <button type="button" class="google-btn" id="google-login-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>or sign in with email</span>
            </div>

            <!-- Email / Password Form -->
            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <div class="form-row">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn" id="btn-submit">Sign In</button>

                <div id="error-msg" class="msg error"></div>
                <div id="success-msg" class="msg success"></div>
            </form>

            <!-- Footer -->
            <div class="card-footer">
                <p>Don't have an account? <a href="register.html">Create one</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initConvex } from './js/convex-db.js';
        import { login, loginWithGoogle } from './js/auth.js';
        import { supabase } from './js/supabase-client.js';

        initConvex();

        // ── Google OAuth ──
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const btn = document.getElementById('google-login-btn');
            const err = document.getElementById('error-msg');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Connecting...';
            err.style.display = 'none';

            const result = await loginWithGoogle();

            if (!result.success) {
                err.innerText = result.error || 'Google sign-in failed.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google`;
            }
            // If success, Supabase will redirect automatically
        });

        // ── Forgot Password ──
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const err = document.getElementById('error-msg');
            const success = document.getElementById('success-msg');

            if (!email) {
                err.innerText = 'Enter your email address above, then click Forgot password.';
                err.style.display = 'block';
                success.style.display = 'none';
                return;
            }

            err.style.display = 'none';
            success.style.display = 'none';

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + window.location.pathname.replace('login.html', 'login.html')
            });

            if (error) {
                err.innerText = error.message;
                err.style.display = 'block';
            } else {
                success.innerText = 'Password reset email sent! Check your inbox.';
                success.style.display = 'block';
            }
        });

        // ── Email/Password Login ──
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const err = document.getElementById('error-msg');
            const success = document.getElementById('success-msg');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Authenticating';
            err.style.display = 'none';
            success.style.display = 'none';

            const response = await login(email, password);

            if (response.success) {
                btn.innerHTML = '<span class="spinner"></span> Redirecting...';
                window.location.href = 'AboveAllCarbon_HELOC_v12_FIXED.html';
            } else {
                err.innerText = response.error || 'Login failed.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Sign In';

                // Shake effect
                const card = document.querySelector('.login-card');
                card.style.transition = 'transform 0.05s';
                card.style.transform = 'translateX(6px)';
                setTimeout(() => card.style.transform = 'translateX(-6px)', 50);
                setTimeout(() => card.style.transform = 'translateX(4px)', 100);
                setTimeout(() => card.style.transform = 'translateX(-4px)', 150);
                setTimeout(() => card.style.transform = 'none', 200);
            }
        });
    </script>
</body>

</html>
